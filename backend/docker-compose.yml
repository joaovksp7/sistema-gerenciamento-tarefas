version: '3.8'

services:
  postgres_db:
    image: postgres:15-alpine
    container_name: meu_postgres_container
    environment:
      POSTGRES_USER: meu_usuario
      POSTGRES_PASSWORD: minha_senha_secreta
      POSTGRES_DB: gerenciador_tarefas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
services:
  - type: web
    name: bahtech-backend
    env: node
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/index.js
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DB_HOST
        fromDatabase:
          name: bahtech-db
          property: host
      - key: DB_USER
        fromDatabase:
          name: bahtech-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: bahtech-db
          property: password
      - key: DB_NAME
        fromDatabase:
          name: bahtech-db
          property: database
      - key: DB_PORT
        fromDatabase:
          name: bahtech-db
          property: port
      - key: R2_ENDPOINT
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_PUBLIC_URL
        sync: false

  - type: web
    name: bahtech-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false

databases:
  - name: bahtech-db
    plan: free
    region: oregon
